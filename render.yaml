services:
  - type: web
    name: event-dashboard-api
    runtime: node
    plan: free
    rootDir: api
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PROJECT_CREATION_TOKEN
        sync: false
